<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>You're all set — Bookworm</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f7f7;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 48px 40px;
      max-width: 440px; width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; color: #111; }
    p  { color: #666; line-height: 1.6; margin-bottom: 10px; font-size: 0.97rem; }
    a  { color: #1da1f2; text-decoration: none; }
    .ref { margin-top: 28px; font-size: 0.8rem; color: #bbb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📚</div>
    <h1>You'll receive your Kindle shortly.</h1>
    <p>We're sending the book to your Amazon account now.</p>
    <p>If you need help, contact us at <a href="https://twitter.com/bookwormx402">@bookwormx402</a>.</p>
    <p>You can close this page.</p>
    <div class="ref" id="ref"></div>
  </div>
  <script>
    const ref = new URLSearchParams(window.location.search).get('ref');
    if (ref) document.getElementById('ref').textContent = 'Reference: ' + ref;
  </script>
</body>
</html>
